<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">


  <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <a class="navbar-brand d-flex align-items-center" href="#">
    <img src="assets/images/logo1.png" alt="Crafted Treasures Logo" height="60" class="me-2">
  </a>
  <a class="navbar-brand">Crafted Treasures</a>
  <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#nav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="nav">
    <ul class="navbar-nav ms-auto align-items-lg-center">
      <li class="nav-item">
        <a class="nav-link active" routerLink="/home">Home <i class="bi bi-house-heart"></i></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/about-us">About Us <i class="bi bi-chat-left-dots"></i></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/contact">Contact <i class="bi bi-telephone"></i></a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" routerLink="/treasures">Treasures <i class="bi bi-box2-heart"></i></a>
      </li>

      <!-- Cart -->
      <li class="nav-item" *ngIf="isLoggedIn">
        <a class="nav-link position-relative me-3" routerLink="/cart">
          Cart <i class="bi bi-cart3"></i>

          <span class="cart-badge" *ngIf="cartCount > 0">
            {{cartCount}}
          </span>
        </a>
      </li>

      <!-- Login/Register for logged out -->
      <li class="nav-item" *ngIf="!isLoggedIn">
        <a class="nav-link" routerLink="/login">Login <i class="bi bi-person-circle"></i></a>
      </li>
      <li class="nav-item" *ngIf="!isLoggedIn">
        <a class="nav-link" routerLink="/register">Register <i class="bi bi-person-add"></i></a>
      </li>

      <!-- User dropdown for logged in -->
      <li class="nav-item dropdown" *ngIf="isLoggedIn">
        <a class="nav-link dropdown-toggle fw-semibold text-warning  no-underline avatar-circle"
           role="button"
           data-bs-toggle="dropdown"
           aria-expanded="false">
            {{ userName.charAt(0).toUpperCase() }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" routerLink="#">Profile</a></li>
            <li><a class="dropdown-item" routerLink="/history">Treasure History</a></li>
            <li><a class="dropdown-item" routerLink="#">Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" (click)="logout()">Logout</a></li>
          </ul>
</li>
    </ul>
  </div>
</nav>
