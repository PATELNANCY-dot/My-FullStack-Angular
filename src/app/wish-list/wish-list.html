<div class="container wishlist-container">
  <h1 class="wishlist-title">My Wishlist</h1>

  <div *ngIf="wishlist.length === 0" class="empty-msg">
    Your wishlist is empty 😢
  </div>

  <div class="row justify-content-center g-4">
    <!-- add justify-content-center -->
    <div class="col-sm-6 col-md-4 col-lg-3" *ngFor="let item of wishlist">
      <div class="wishlist-card position-relative p-3">

        <!-- Remove button -->
        <i class="bi bi-x-circle-fill remove-btn"
           (click)="removeFromWishlist(item)"></i>

        <!-- Product image -->
        <img [src]="item.productImage" class="card-img-top mb-2" alt="{{item.productName}}">

        <!-- Product name -->
        <h5 class="card-title">
          {{ item.productName }}
          <i class="bi bi-sticky-fill note-icon" (click)="toggleNote(item)"></i>
        </h5>

        <!-- Sliding Note Section -->
        <div class="note-section" [class.show]="item.showNote">
          <textarea [(ngModel)]="item.note"
                    placeholder="Add a note..."
                    class="note-textarea mb-2"></textarea>
          <button class="btn save-note-btn" (click)="saveNote(item)">Save Note</button>
        </div>

      </div>
    </div>
  </div>
</div>
