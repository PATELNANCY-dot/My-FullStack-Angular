<div class="login-container">

  <div class="login-card">

    <h2 class="text-center mb-4">Admin Login</h2>

    <form>

      <div class="mb-3">
        <label>Email</label>
        <input type="email"
               class="form-control"
               [(ngModel)]="email"
               name="email"
               placeholder="Enter admin email">
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password"
               class="form-control"
               [(ngModel)]="password"
               name="password"
               placeholder="Enter password">
      </div>

      <button type="button"
              (click)="login()"
              class="btn btn-dark w-100">
        Login
      </button>

    </form>

  </div>

</div>
