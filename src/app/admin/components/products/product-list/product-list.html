<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<div class="product-container">

  <h2 class="page-title">Product List</h2> <p>Total Products: {{products.length}}</p>
  <div class="search-box">
    <input type="text"
           placeholder="Search product..."
           [(ngModel)]="searchText"
           (keyup)="searchProduct()">

    <button (click)="searchProduct()">
      <i class="bi bi-search"></i>
    </button>
  </div>
 

  <table class="product-table">

    <thead>
      <tr>
        <th>ID</th>
        <th>Image</th>
        <th>Name</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Description</th>
        <th>Actions</th> <!-- new column for buttons -->
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let product of products">
        <td>{{product.productid}}</td>

        <td>
          <img [src]="product.productimage" class="product-img">
        </td>

        <td>{{product.productname}}</td>
        <td>₹ {{product.price}}</td>

        <td>
          <span [class.out-stock]="product.productquentity == 0">
            {{product.productquentity}}
          </span>
        </td>

        <td class="desc">
          {{product.productdescription}}
        </td>

        <!-- Edit Button -->
        <td class="action-buttons">
          <button class="btn-edit" (click)="edit(product.productid)">
            Edit <i class="bi bi-pencil-square"></i>
          </button>

          <button class="btn-delete" (click)="deleteProduct(product.productid)">
            <i class="bi bi-trash"></i>
          </button>
        </td>

      </tr>
    </tbody>

  </table>

</div>
