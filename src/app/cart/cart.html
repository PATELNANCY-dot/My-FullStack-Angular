<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Favicon -->
<link rel="icon" type="image/png" href="logo1.png">
<link rel="shortcut icon" href="logo1.png" type="image/x-icon">


<title> Crafted Treasures | Cart </title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<div class="container my-5">

  <div class="card p-4">

    <h3 class="mb-4 treasure-cart1">Treasure Cart</h3>

    <!-- CART ITEMS -->

    <div *ngFor="let item of cart" class="row align-items-center border-bottom py-3">

      <div class="col-md-2">
        <img [src]="item.imgSrc" class="cart-img rounded">
      </div>

      <div class="col-md-4 treasure-title ">
        {{item.title}}
      </div>

      <div class="col-md-2 fw-bold treasure-price ">
        RS. {{ item.price * item.quantity | number:'1.2-2' }}
      </div>

      <div class="col-md-2 d-flex align-items-center">

        <button class="btn btn-sm btn-outline-secondary"
                (click)="updateCartQuantity(item.cartid,-1)">
          -
        </button>

        <input type="text"
               [value]="item.quantity"
               readonly
               class="form-control form-control-sm text-center mx-2"
               style="width:50px;">

        <button class="btn btn-sm btn-outline-secondary"
                (click)="updateCartQuantity(item.cartid,1)"
                [disabled]="item.quantity >= item.productquentity">
          +
        </button>

      </div>

      <div class="col-md-1 text-danger"
           style="cursor:pointer;"
           (click)="removeCartItem(item.cartid)">
        ✕
      </div>

    </div>


    <!-- TOTAL -->

    <div class="d-flex justify-content-between mt-4">

      <h4>Total: RS. {{totalPrice}}</h4>

      <button id="buy"
              class="btn btn-danger"
              (click)="buyNow()">
        BUY
      </button>

    </div>

  </div>

</div>
