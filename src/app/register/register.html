<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/images/logo1.png">
  <link rel="shortcut icon" href="/assets/images/logo1.png" type="image/x-icon">


  <title> Crafted Treasures | Register </title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">



</head>

<body>

  <div class="register-glass">
    <div class="register-box">
      <button class="close-btn"><i class="bi bi-x-lg"></i></button>
    </div>

    <!-- Brand -->
    <div class="brand">
      <img src="/assets/images/logo1.png" alt="Crafted Treasures Logo">
      <h1>Crafted Treasures</h1>
      <span>Handmade • Heritage • Heart</span>
    </div>

    <div class="divider"></div>

    <h2>Claim Your Treasure <i class="bi bi-gem"></i></h2>

    <!-- Angular Form -->
    <form (ngSubmit)="registerUser()">
      <div class="mb-2">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="fullName" name="fullName" class="form-control" placeholder="Enter your full name" required>
      </div>

      <div class="mb-2">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" class="form-control" placeholder="Enter your email" required>
      </div>

      <div class="mb-2">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" class="form-control" placeholder="Create a password" required>
      </div>

      <div class="mb-2">
        <label>Confirm Password</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" class="form-control" placeholder="Re-enter your password" required>
      </div>

      <button type="submit" class="btn btn-register w-100">
        Register
      </button>
    </form>

    <div class="login-link">
      Already have an account? <a routerLink="/login">Login</a>
    </div>
  </div>
</body>
</html>
